apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmanage-ai
  namespace: openmanage-production
  labels:
    app: openmanage-ai
    env: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: openmanage-ai
      env: production
  template:
    metadata:
      labels:
        app: openmanage-ai
        env: production
    spec:
      containers:
        - name: openmanage-ai
          image: ${DOCKER_IMAGE}:${IMAGE_TAG}
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: openmanage-config
            - secretRef:
                name: openmanage-secrets
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      imagePullSecrets:
        - name: dockerhub-credentials

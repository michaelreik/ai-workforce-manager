apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: openmanage-ai
  namespace: openmanage-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openmanage-ai
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
